# ── Server ──────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=steganos-backend

# ── File upload limits (up to 50 MB images) ─────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=52MB

# ── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.steganos=DEBUG
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level [%thread] %logger{30} - %msg%n
